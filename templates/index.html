<!DOCTYPE html>
<html>
<head>
    <title>GovAI Finder</title>

    <style>
        body {
            font-family: 'Segoe UI';
            margin: 0;
            background: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .form-box {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ea580c;
        }

        .results {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 30px;
        }

        .card {
            background: white;
            color: black;
            width: 260px;
            margin: 12px;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card h3 {
            margin-bottom: 12px;
        }

        .apply-btn {
            background: green;
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
        }

        .apply-btn:hover {
            background: darkgreen;
        }

        .no-result {
            text-align: center;
            margin-top: 20px;
            color: #ff4d4d;
            font-weight: bold;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>🚀 GovAI Scheme Finder</header>

<div class="container">
<div class="form-box">

<form method="POST">

<input type="text" name="name" placeholder="Enter Your Name" required>

<input type="number" name="age" placeholder="Enter Age" required>

<input type="number" name="income" placeholder="Enter Income" required>

<select name="education">
<option value="">Select Education</option>
<option>12th Pass</option>
<option>Graduate</option>
</select>

<select name="occupation">
<option value="">Select Occupation</option>
<option>Student</option>
<option>Farmer</option>
<option>Unemployed</option>
</select>

<select name="state">
<option value="">Select State</option>

<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>

<option>Andaman and Nicobar Islands</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>
<option>Delhi</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
<option>Ladakh</option>
<option>Jammu and Kashmir</option>

</select>

<button type="submit">Find Schemes</button>

</form>
</div>
</div>

<!-- 👇 Personalized Greeting -->
{% if user_name %}
<h2>Hi {{ user_name }} 👋</h2>
{% endif %}

<!-- 👇 Results -->
{% if results %}
<div class="results">
    {% for r in results %}
    <div class="card">
        <h3>{{ r.name }}</h3>
        <a class="apply-btn" href="{{ r.link }}" target="_blank">Apply Now</a>
    </div>
    {% endfor %}
</div>
{% endif %}

<!-- 👇 No Result -->
{% if user_name and not results %}
<p class="no-result">
    Hi {{ user_name }}, no schemes found 😔<br>
    Try different details.
</p>
{% endif %}

</body>
</html>
