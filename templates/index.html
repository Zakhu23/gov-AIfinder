<!DOCTYPE html>
<html>
<head>
    <title>GovAI Finder</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .box {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            margin: 30px auto;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .results {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .card {
            background: white;
            color: black;
            width: 250px;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .apply-btn {
            display: inline-block;
            padding: 8px 12px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .no-result {
            color: red;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h1>🚀 GovAI Scheme & Exam Finder</h1>

<div class="box">
<form method="POST">

<input type="number" name="income" placeholder="Enter Income" required>

<select name="education">
    <option value="">Select Education</option>
    <option>12th Pass</option>
    <option>Graduate</option>
</select>

<select name="occupation">
    <option value="">Select Occupation</option>
    <option>Student</option>
    <option>Farmer</option>
    <option>Unemployed</option>
</select>

<button type="submit">Find Schemes</button>
</form>
</div>

{% if results %}
<div class="results">
    {% for r in results %}
    <div class="card">
        <h3>{{ r.name }}</h3>
        <a class="apply-btn" href="{{ r.link }}" target="_blank">Apply Now</a>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="no-result">No matching schemes found</p>
{% endif %}

</body>
</html>
